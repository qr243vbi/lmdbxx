name: Build Debian Package

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - test
  pull_request:
    branches:
      - master

jobs:
 build-rpm:
  runs-on: ubuntu-latest
  container: fedora:latest

  steps:
    - name: Install RPM build tools
      run: |
        dnf install -y rpm-build rpmdevtools gcc-c++ meson ninja-build lmdb-devel pkgconfig tar gzip

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup RPM build tree
      run: |
        rpmdev-setuptree

    - name: Create source tarball
      run: |
        VERSION=$(head -1 debian/changelog | sed 's/.*(\(.*\)).*/\1/' | cut -d- -f1)
        echo "VERSION=$VERSION"

        cd ..
        tar --exclude='.git' --exclude='.github' --exclude='debian' \
          -czf "$HOME/rpmbuild/SOURCES/lmdbxx-${VERSION}.tar.gz" \
          --transform "s,^lmdbxx,lmdbxx-${VERSION}," lmdbxx

    - name: Copy spec file
      run: |
        cp lmdbxx.spec $HOME/rpmbuild/SPECS/

    - name: Build RPM
      run: |
        VERSION=$(head -1 debian/changelog | sed 's/.*(\(.*\)).*/\1/' | cut -d- -f1)

        rpmbuild -ba $HOME/rpmbuild/SPECS/lmdbxx.spec \
          --define "_version $VERSION"

    - name: Collect artifacts
      run: |
        mkdir -p artifacts
        cp -r $HOME/rpmbuild/RPMS $HOME/rpmbuild/SRPMS artifacts/

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rpm-packages
        path: artifacts/

 build-debian:
    runs-on: ubuntu-latest
    container: debian:testing

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install apt dependencies
        run: |
          apt-get update -y
          apt-get install -y debhelper-compat dpkg-dev lintian autopkgtest autodep8 liblmdb-dev g++ meson ninja-build liblmdb-dev build-essential pkg-config libc6-dev

      - name: Create upstream tarball
        run: |
          VERSION=$(head -1 debian/changelog | sed 's/.*(\(.*\)).*/\1/' | cut -d- -f1)
          echo "VERSION=$VERSION"
          cd ..
          tar --exclude='.git' --exclude='.github' --exclude='debian' -czf "lmdbxx_${VERSION}.orig.tar.gz" \
            --transform "s,^lmdbxx,lmdbxx-${VERSION}," lmdbxx
          ls -la *.tar.gz

      - name: Build package
        run: |
          rm -rf .github
          dpkg-buildpackage -us -uc -sa

      - name: List built files
        run: |
          echo "=== Files in parent dir ==="
          ls -la ../

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp ../*.deb ../*.dsc ../*.tar.* ../*.changes ../*.buildinfo artifacts/
          echo "=== Artifacts ==="
          ls -la artifacts/

      - name: Verify package
        run: |
          for deb in artifacts/*.deb; do
            echo "Package: $deb"
            dpkg-deb --info "$deb"
          done

      - name: Run lintian
        run: lintian -i artifacts/*.changes

      - name: Run autopkgtest
        run: |
          cd artifacts
          autopkgtest *.dsc -- null

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debian-packages
          path: artifacts/
          if-no-files-found: error
